# TODO: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY — AWS IAM 자격증명
# TODO: S3_BUCKET_NAME — 배포 대상 S3 버킷 이름
name: Frontend Deploy

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    outputs:
      commit-hash: ${{ steps.commit-info.outputs.commit-hash }}
      timestamp: ${{ steps.commit-info.outputs.timestamp }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get commit info
        id: commit-info
        run: |
          echo "commit-hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT
          echo "Commit hash: $(git rev-parse --short HEAD)"
          echo "Timestamp: $(date +%s)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bunx expo export --platform web

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not found"
            exit 1
          fi
          echo "Build verification passed"
          ls -la dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files-${{ steps.commit-info.outputs.commit-hash }}
          path: dist/
          retention-days: 7

  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: build
    # PR이 아닌 경우에만 배포 실행 (push 또는 workflow_dispatch)
    if: github.event_name != 'pull_request'
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files-${{ needs.build.outputs.commit-hash }}
          path: dist/

      - name: Verify artifact download
        run: |
          echo "Downloaded artifact contents:"
          ls -la dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Upload to S3
        run: |
          BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          COMMIT_HASH=${{ needs.build.outputs.commit-hash }}
          TIMESTAMP=${{ needs.build.outputs.timestamp }}

          echo "Deploying to S3 bucket: $BUCKET_NAME"
          echo "Commit hash: $COMMIT_HASH"

          # 1. 정적 에셋 — 장기 캐시 (파일명에 해시 포함)
          aws s3 sync dist/_expo/ s3://$BUCKET_NAME/_expo/ \
            --cache-control "max-age=31536000,public" \
            --metadata-directive REPLACE \
            --metadata "commit-hash=$COMMIT_HASH,timestamp=$TIMESTAMP"

          # 2. HTML 등 루트 파일 — 캐시 없음 (항상 최신)
          aws s3 sync dist/ s3://$BUCKET_NAME/ \
            --exclude "_expo/*" \
            --cache-control "max-age=0,no-cache,no-store,must-revalidate" \
            --metadata-directive REPLACE \
            --metadata "commit-hash=$COMMIT_HASH,timestamp=$TIMESTAMP"

      - name: Create deployment info
        run: |
          echo "Deployment completed successfully!"
          echo "Commit: ${{ needs.build.outputs.commit-hash }}"
          echo "Timestamp: ${{ needs.build.outputs.timestamp }}"
