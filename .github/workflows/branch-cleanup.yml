name: Branch Cleanup

on:
  pull_request:
    types: [opened, closed]
    branches:
      - main

jobs:
  # PR 생성 시 assignee 및 reviewer 자동 할당
  auto-assign:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    
    steps:
      - name: Auto assign PR creator and reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const prAuthor = context.payload.pull_request.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            try {
              // PR 작성자를 assignee로 할당
              await github.rest.issues.addAssignees({
                owner: owner,
                repo: repo,
                issue_number: prNumber,
                assignees: [prAuthor]
              });
              
              console.log(`✅ ${prAuthor}을 담당자로 할당했습니다`);
              
            } catch (error) {
              console.log(`❌ 담당자 할당 중 오류 발생:`, error.message);
            }

  # PR merge 후 브랜치 삭제 및 알림
  cleanup-and-notify:
    # PR이 merge되었을 때만 실행 (단순 close는 제외)
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete merged branch and notify
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const prAuthor = context.payload.pull_request.user.login;
            
            try {
              // 브랜치 삭제
              await github.rest.git.deleteRef({
                owner: owner,
                repo: repo,
                ref: `heads/${branchName}`
              });
              
              console.log(`✅ 브랜치 '${branchName}'가 성공적으로 삭제되었습니다`);
              
              // PR에 완료 코멘트 추가
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: prNumber,
                body: `🎉 **PR이 성공적으로 병합되었습니다!**\n\n✅ 브랜치 \`${branchName}\`가 자동으로 삭제되었습니다\n👤 병합자: @${context.actor}\n📝 작성자: @${prAuthor}\n\n기여해주셔서 감사합니다! 🚀`
              });
              
            } catch (error) {
              console.log(`❌ 브랜치 '${branchName}' 삭제 실패:`, error.message);
              
              // 에러가 발생해도 워크플로우를 실패시키지 않음
              if (error.status === 422) {
                console.log('브랜치가 이미 삭제되었거나 존재하지 않습니다');
              }
            }
